name: Release

on:
  pull_request:
    types: [closed]
    branches: [main, release-test-feat2, release-test-fix2]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Determine version bump
        id: bump
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR title: $TITLE"

          if echo "$TITLE" | grep -qE '^[a-z]+(\(.+\))?\!:'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$TITLE" | grep -qE '^feat(\(.+\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$TITLE" | grep -qE '^fix(\(.+\))?:'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          elif echo "$TITLE" | grep -qE '^perf(\(.+\))?:'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=" >> "$GITHUB_OUTPUT"
            echo "No version bump needed for this PR"
          fi

      - name: Checkout
        if: steps.bump.outputs.type != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.bump.outputs.type != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract changelog from PR body
        if: steps.bump.outputs.type != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.pull_request.body || '';

            const match = body.match(/^# Changelog\s*\n([\s\S]*?)(?=\n# (?!##))/m)
              || body.match(/^# Changelog\s*\n([\s\S]*)$/m);
            if (!match) {
              fs.writeFileSync('/tmp/changelog_entry.md', '');
              return;
            }

            const content = match[1]
              .replace(/<!--[\s\S]*?-->/g, '')
              .replace(/^-\s*$/gm, '')
              .replace(/^### \w+\n+(?=### |\s*$)/gm, '')
              .replace(/### \w+\s*$/g, '')
              .trim();

            fs.writeFileSync('/tmp/changelog_entry.md', content);

      - name: Bump version and update CHANGELOG
        if: steps.bump.outputs.type != ''
        id: version
        run: |
          git config --global user.name "github-machine-monolith"
          git config --global user.email "github.machine.monolith@gmail.com"

          NEW_VERSION=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          CHANGELOG_BODY=$(cat /tmp/changelog_entry.md)
          if [ -n "$CHANGELOG_BODY" ] && [ -f CHANGELOG.md ]; then
            DATE=$(date +%Y-%m-%d)
            ENTRY=$(printf '## [%s] - %s\n\n%s' "${NEW_VERSION#v}" "$DATE" "$CHANGELOG_BODY")

            awk -v entry="$ENTRY" '
              /^## \[/ && !inserted {
                print entry
                print ""
                inserted=1
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          fi

          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release $NEW_VERSION"

      - name: Push
        if: steps.bump.outputs.type != ''
        run: |
          git push origin ${{ github.event.pull_request.base.ref }}
