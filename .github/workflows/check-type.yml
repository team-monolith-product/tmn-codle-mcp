name: Check Type

on:
  - pull_request
  - workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Check Type
        run: |
          npm ci
          npm run typecheck
